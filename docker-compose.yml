version: "3.9"

services:
  api:
    build: .
    container_name: spikeeo-api
    ports:
      - "8000:8000"
    environment:
      - SPIKEEO_APP_ENV=production
      - SPIKEEO_APP_DEBUG=false
      - SPIKEEO_DATABASE_URL=sqlite+aiosqlite:///./spikeeo.db
      - SPIKEEO_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./pretrained:/app/pretrained
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
